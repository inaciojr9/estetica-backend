# Banco de Dados - Supabase (Seguro via Variáveis de Ambiente)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=${SUPABASE_DB_PASSWORD}
quarkus.datasource.jdbc.url=${SUPABASE_DB_URL}
# Força o Quarkus a ignorar a checagem de metadados e usar o dialeto correto direto
quarkus.hibernate-orm.database.version=15
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect


# Configurações da Bunny.net (Seguro via Variáveis de Ambiente)
bunny.storage.zone=${BUNNY_STORAGE_ZONE}
bunny.api.key=${BUNNY_API_KEY}
bunny.pull.url=${BUNNY_PULL_URL}

# Liberação Absoluta de CORS para Produção no Quarkus 3.x
%prod.quarkus.http.cors=true
%prod.quarkus.http.cors.origins=*
%prod.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%prod.quarkus.http.cors.headers=accept,authorization,content-type,origin
